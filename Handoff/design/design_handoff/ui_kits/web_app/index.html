<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fastlane Compass — UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --fc-base:          #F2F7F4;
    --fc-surface:       #EAF0EC;
    --fc-dark:          #1A2520;
    --fc-accent:        #2E7D52;
    --fc-accent-h:      #3A9E6A;
    --fc-gold:          #C69B30;
    --fc-danger:        #E84434;
    --fc-text:          #141F19;
    --fc-muted:         #7A9A8A;
    --fc-border:        #EAF0EC;
    --fc-card-r:        12px;
    --fc-hero-r:        20px;
    --font-sans:        'IBM Plex Sans', sans-serif;
    --font-mono:        'IBM Plex Mono', monospace;
  }

  /* Theme: default (clean) */
  body[data-theme="clean"] {
    --fc-base: #F2F7F4;
    --fc-surface: #EAF0EC;
    --fc-card-bg: #FFFFFF;
    --fc-card-shadow: 0 1px 3px rgba(20,31,25,0.08);
    --fc-card-border: 1px solid #EAF0EC;
    --fc-input-bg: #EAF0EC;
    --fc-chip-shadow: none;
  }
  /* Theme: neumorphic */
  body[data-theme="neumorphic"] {
    --fc-base: #E8EDE9;
    --fc-surface: #E0E8E1;
    --fc-card-bg: #E8EDE9;
    --fc-card-shadow: 5px 5px 12px rgba(175,195,180,0.7), -4px -4px 10px rgba(255,255,255,0.85);
    --fc-card-border: none;
    --fc-input-bg: #E8EDE9;
    --fc-chip-shadow: 3px 3px 7px rgba(175,195,180,0.65), -2px -2px 6px rgba(255,255,255,0.85);
  }
  /* Theme: dark */
  body[data-theme="dark"] {
    --fc-base: #111A16;
    --fc-surface: #1A2520;
    --fc-card-bg: #1E2C26;
    --fc-card-shadow: 0 1px 3px rgba(0,0,0,0.3);
    --fc-card-border: 1px solid rgba(255,255,255,0.08);
    --fc-text: #E8F0EA;
    --fc-muted: #5A7A6A;
    --fc-border: rgba(255,255,255,0.08);
    --fc-input-bg: #1A2520;
    --fc-chip-shadow: none;
  }

  html, body { height: 100%; }
  body {
    background: var(--fc-base);
    font-family: var(--font-sans);
    color: var(--fc-text);
    transition: background 0.25s, color 0.25s;
    -webkit-font-smoothing: antialiased;
  }

  #root { height: 100%; }

  /* Layout */
  .app-shell { display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 68px; flex-shrink: 0;
    background: var(--fc-dark);
    display: flex; flex-direction: column; align-items: center;
    padding: 16px 0; gap: 4px;
    height: 100vh; position: fixed; left: 0; top: 0; z-index: 40;
  }
  .sidebar-logo {
    width: 40px; height: 40px; border-radius: 999px;
    background: var(--fc-accent);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-weight: 700; font-size: 13px; color: white;
    margin-bottom: 12px; flex-shrink: 0;
    box-shadow: 0 2px 10px rgba(46,125,82,0.45);
  }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    width: 56px; padding: 9px 4px; border-radius: 999px;
    border: none; cursor: pointer; background: transparent;
    color: #6A8A7A; transition: color 0.15s, background 0.15s;
  }
  .nav-btn.active { background: rgba(46,125,82,0.18); color: #3A9E6A; }
  .nav-btn:hover:not(.active) { color: #3A9E6A; }
  .nav-btn span { font-family: var(--font-sans); font-size: 9px; font-weight: 500; text-align: center; line-height: 1.2; }
  .sidebar-avatar {
    width: 36px; height: 36px; border-radius: 999px;
    background: var(--fc-accent); color: white;
    font-family: var(--font-sans); font-size: 11px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    margin-top: auto; flex-shrink: 0;
  }

  /* Main content */
  .main-content {
    flex: 1; margin-left: 68px;
    overflow-y: auto; height: 100vh;
    padding-bottom: 0;
  }
  .content-inner { max-width: 672px; margin: 0 auto; padding: 20px 16px 80px; }

  /* Bottom nav */
  .bottom-nav {
    display: none;
    position: fixed; bottom: 12px; left: 16px; right: 16px;
    height: 64px; background: var(--fc-dark);
    align-items: center; justify-content: space-around;
    padding: 0 8px; z-index: 40;
    border-radius: 999px;
    box-shadow: 8px 8px 20px rgba(10,18,14,0.45), -4px -4px 12px rgba(40,60,48,0.25);
  }
  .bn-btn {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 6px 12px; border-radius: 999px; border: none; cursor: pointer;
    background: transparent; color: #6A8A7A; transition: color 0.15s, background 0.15s;
  }
  .bn-btn.active { background: rgba(46,125,82,0.18); color: #3A9E6A; }
  .bn-btn span { font-family: var(--font-sans); font-size: 9px; font-weight: 500; }

  @media (max-width: 640px) {
    .sidebar { display: none; }
    .main-content { margin-left: 0; padding-bottom: 88px; }
    .bottom-nav { display: flex; }
  }

  /* Cards */
  .card {
    background: var(--fc-card-bg, #fff);
    border: var(--fc-card-border, 1px solid #EAF0EC);
    border-radius: var(--fc-card-r);
    box-shadow: var(--fc-card-shadow, 0 1px 3px rgba(20,31,25,0.08));
    padding: 14px;
    transition: background 0.25s, box-shadow 0.25s;
  }
  .hero-card {
    background: var(--fc-dark);
    border-radius: var(--fc-hero-r);
    padding: 20px;
    margin-bottom: 16px;
  }

  /* Typography helpers */
  .mono { font-family: var(--font-mono); }
  .hero-val { font-family: var(--font-mono); font-size: 38px; font-weight: 600; line-height: 1; }
  .label-micro { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.09em; text-transform: uppercase; color: var(--fc-muted); }
  .section-title { font-family: var(--font-sans); font-size: 13px; font-weight: 600; color: var(--fc-text); }
  .text-muted { color: var(--fc-muted); }
  .text-positive { color: #3A9E6A; }
  .text-negative { color: #E84434; }
  .text-gold { color: #C69B30; }

  /* Badges */
  .badge { font-size: 10px; border-radius: 5px; padding: 2px 7px; display: inline-flex; align-items: center; box-shadow: var(--fc-chip-shadow, none); }
  .badge-neutral { background: var(--fc-surface); color: var(--fc-muted); }
  .badge-accent  { background: var(--fc-surface); color: var(--fc-accent); }
  .badge-danger  { background: #FFF0EF; color: #E84434; }
  .badge-gold    { background: rgba(198,155,48,0.12); border: 0.5px solid rgba(198,155,48,0.3); color: #C69B30; }
  .badge-confirm { background: var(--fc-surface); color: #3A9E6A; }

  /* Tabs */
  .tabs { background: var(--fc-surface); border-radius: 999px; padding: 4px; display: flex; gap: 4px; margin-bottom: 16px; }
  .tab { flex: 1; padding: 7px; border-radius: 999px; border: none; cursor: pointer; font-family: var(--font-sans); font-size: 12px; font-weight: 500; background: transparent; color: var(--fc-muted); transition: all 0.15s; }
  .tab.active { background: var(--fc-card-bg, white); color: var(--fc-text); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

  /* Retention bar */
  .ret-track { background: rgba(232,68,52,0.2); border-radius: 4px; height: 6px; overflow: hidden; }
  .ret-fill  { height: 6px; background: #3A9E6A; border-radius: 4px; }

  /* Progress bar */
  .prog-track { background: var(--fc-surface); border-radius: 4px; height: 5px; overflow: hidden; }
  .prog-fill  { height: 5px; border-radius: 4px; }

  /* Secondary row in hero */
  .hero-row {
    background: rgba(46,125,82,0.1);
    border-radius: 8px;
    padding: 9px 12px;
    display: flex; align-items: center;
    margin: 10px 0;
  }
  .hero-row-div { width: 0.5px; background: rgba(46,125,82,0.25); height: 36px; margin: 0 10px; }

  /* FAB */
  .fab {
    position: fixed; bottom: 80px; right: 20px;
    width: 52px; height: 52px; border-radius: 999px;
    background: var(--fc-accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(46,125,82,0.4); z-index: 30;
    transition: transform 0.1s, background 0.15s;
  }
  .fab:hover { background: var(--fc-accent-h, #3A9E6A); }
  .fab:active { transform: scale(0.93); }
  @media (min-width: 641px) { .fab { bottom: 24px; } }

  /* Modal overlay */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: flex-end; z-index: 50;
    animation: fadeIn 0.15s;
  }
  @media (min-width: 641px) {
    .modal-overlay { align-items: center; justify-content: center; }
    .modal-sheet { border-radius: 20px !important; max-width: 480px; width: 100%; }
  }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  .modal-sheet {
    background: var(--fc-dark); width: 100%; border-radius: 24px 24px 0 0;
    padding: 20px; max-height: 90vh; overflow-y: auto;
    animation: slideUp 0.2s cubic-bezier(0.32,0.72,0,1);
  }
  @keyframes slideUp { from { transform: translateY(100%) } to { transform: translateY(0) } }

  /* Empty state */
  .empty-state {
    background: var(--fc-surface); border-radius: 16px;
    padding: 28px; text-align: center;
  }

  /* Onboarding step */
  .onb-step {
    display: flex; align-items: flex-start; gap: 12px;
    background: var(--fc-card-bg, white);
    border: var(--fc-card-border, 1px solid #EAF0EC);
    border-radius: 14px; padding: 14px; margin-bottom: 10px;
    box-shadow: var(--fc-card-shadow);
    transition: background 0.25s;
  }
  .onb-num {
    width: 28px; height: 28px; border-radius: 999px;
    background: var(--fc-accent); color: white;
    font-family: var(--font-mono); font-size: 12px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .onb-num.done { background: var(--fc-surface); color: #3A9E6A; }

  /* Tx row */
  .tx-row { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--fc-border); }
  .tx-row:last-child { border-bottom: none; }

  /* Dim pill dark */
  .dim-pill { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 10px 12px; }

  /* Score ring */
  .score-wrap { position: relative; width: 96px; height: 96px; display: flex; align-items: center; justify-content: center; }

  /* Ghost link btn */
  .ghost-btn { background: transparent; border: none; font-family: var(--font-sans); font-size: 12px; font-weight: 500; color: var(--fc-accent); cursor: pointer; padding: 0; transition: color 0.15s; }
  .ghost-btn:hover { color: var(--fc-accent-h, #3A9E6A); }

  /* Input */
  .fc-input {
    width: 100%; background: var(--fc-input-bg, #EAF0EC);
    border: none; outline: none; border-radius: 10px;
    padding: 10px 14px; font-family: var(--font-sans); font-size: 14px;
    color: var(--fc-text); transition: background 0.2s;
  }
  .fc-input::placeholder { color: var(--fc-muted); }
  .fc-input-mono { font-family: var(--font-mono); font-size: 18px; font-weight: 500; }

  /* Primary btn */
  .fc-btn {
    background: var(--fc-accent); color: white;
    font-family: var(--font-sans); font-size: 13px; font-weight: 600;
    padding: 11px 22px; border-radius: 999px; border: none; cursor: pointer;
    width: 100%; transition: background 0.15s;
  }
  .fc-btn:hover { background: #3A9E6A; }

  /* Dark mode text overrides */
  body[data-theme="dark"] .section-title { color: #E8F0EA; }
  body[data-theme="dark"] .fc-input { color: #E8F0EA; }
  body[data-theme="dark"] .badge-neutral { background: rgba(255,255,255,0.08); color: #7A9A8A; }
  body[data-theme="dark"] .badge-accent  { background: rgba(46,125,82,0.18); color: #3A9E6A; }
  body[data-theme="dark"] .tabs { background: rgba(255,255,255,0.06); }
  body[data-theme="dark"] .tab.active { background: rgba(255,255,255,0.1); color: #E8F0EA; }
  body[data-theme="dark"] .prog-track { background: rgba(255,255,255,0.08); }
  body[data-theme="dark"] .empty-state { background: rgba(255,255,255,0.05); }
  body[data-theme="dark"] .onb-step { background: #1E2C26; border-color: rgba(255,255,255,0.08); }
  body[data-theme="dark"] .ret-track { background: rgba(232,68,52,0.15); }
</style>
</head>
<body data-theme="clean">

<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="MiRealidad.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="Brujula.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ─── Tweaks defaults ──────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "neumorphic",
  "sidebarStyle": "rounded",
  "cardDensity": "comfortable"
}/*EDITMODE-END*/;

// ─── Nav icons (inline for use everywhere) ────────────────
const NavIcon = ({ id, size = 20 }) => {
  const icons = {
    'mi-realidad': <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>,
    'dashboard':   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><rect x="3" y="12" width="4" height="8" rx="1"/><rect x="10" y="7" width="4" height="13" rx="1"/><rect x="17" y="3" width="4" height="17" rx="1"/></svg>,
    'brujula':     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><circle cx="12" cy="12" r="9"/><path d="M16.2 7.8l-2.6 5.4-5.4 2.6 2.6-5.4 5.4-2.6z" fill="currentColor" stroke="none"/></svg>,
    'ideas':       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><path d="M12 2c-3.5 0-6 3-6 6.5 0 2.5 1.2 4.5 3 5.5v2h6v-2c1.8-1 3-3 3-5.5C18 5 15.5 2 12 2z"/><path d="M9 19h6M10 22h4"/></svg>,
  };
  return icons[id] || null;
};

const NAV_ITEMS = [
  { id: 'mi-realidad', label: 'Mi Realidad' },
  { id: 'dashboard',   label: 'Dashboard'   },
  { id: 'brujula',     label: 'Brújula'     },
  { id: 'ideas',       label: 'Ideas'       },
];

// ─── Sidebar ──────────────────────────────────────────────
function Sidebar({ active, onNav }) {
  return (
    <aside className="sidebar">
      <div className="sidebar-logo">FC</div>
      {NAV_ITEMS.map(({ id, label }) => (
        <button key={id} className={`nav-btn ${active === id ? 'active' : ''}`} onClick={() => onNav(id)}>
          <NavIcon id={id} />
          <span>{label}</span>
        </button>
      ))}
      <div className="sidebar-avatar">JD</div>
    </aside>
  );
}

// ─── Bottom Nav ───────────────────────────────────────────
function BottomNav({ active, onNav }) {
  return (
    <nav className="bottom-nav">
      {NAV_ITEMS.map(({ id, label }) => (
        <button key={id} className={`bn-btn ${active === id ? 'active' : ''}`} onClick={() => onNav(id)}>
          <NavIcon id={id} />
          <span>{label}</span>
        </button>
      ))}
    </nav>
  );
}

// ─── Shared ───────────────────────────────────────────────
function fmt(n, currency = 'USD') {
  return new Intl.NumberFormat('en-US', { style:'currency', currency, minimumFractionDigits:0, maximumFractionDigits:0 }).format(Math.abs(n));
}
function fmtFull(n) {
  return new Intl.NumberFormat('en-US', { style:'currency', currency:'USD', minimumFractionDigits:0 }).format(n);
}
function fmtDays(d) {
  const a = Math.abs(d);
  if (a >= 365) return `${(a/365).toFixed(1)}a`;
  if (a >= 30)  return `${(a/30).toFixed(1)}m`;
  return `${a.toFixed(1)}d`;
}

// ─── Modal ────────────────────────────────────────────────
function Modal({ title, onClose, children }) {
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-sheet">
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20 }}>
          <p style={{ fontFamily:'var(--font-sans)', fontSize:16, fontWeight:600, color:'#F2F7F4', margin:0 }}>{title}</p>
          <button onClick={onClose} style={{ background:'transparent', border:'none', color:'#7A9A8A', cursor:'pointer', padding:4 }}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.8} strokeLinecap="round" width={20} height={20}><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ─── Mi Realidad ──────────────────────────────────────────
const MR_STATE = 'completo'; // 'sin_datos' | 'solo_ingresos' | 'completo'

const MR_DATA = {
  precio_hora: 18.40, delta: 2.10,
  total_ingresos: 4800, horas_reales: 52.3,
  ingresos: [
    { id:1, label:'Salario Empresa X', type:'fixed', frequency:'monthly', amount:4000, entries:[{ amount:4000, entry_date:'01 abr' }] },
    { id:2, label:'Freelance diseño',  type:'project', frequency:'irregular', amount:800, entries:[] },
  ],
  desglose: { contratadas:40, extra:4.5, desplazamiento:5.5, preparacion:0.8, carga_mental:1.5 },
};

function MiRealidad({ onModal }) {
  const [expanded, setExpanded] = useState(null);
  const state = MR_STATE;

  if (state === 'sin_datos') {
    return (
      <div className="content-inner">
        <div style={{ marginBottom:20 }}>
          <h1 style={{ fontFamily:'var(--font-sans)', fontSize:22, fontWeight:700, color:'var(--fc-text)', marginBottom:4 }}>Mi Realidad</h1>
          <p className="text-muted" style={{ fontSize:12 }}>Descubre cuánto vale realmente tu hora de vida</p>
        </div>
        {/* Onboarding */}
        <div style={{ background:'var(--fc-dark)', borderRadius:20, padding:20, marginBottom:20 }}>
          <p style={{ fontFamily:'var(--font-mono)', fontSize:9, textTransform:'uppercase', letterSpacing:'0.09em', color:'#3A9E6A', marginBottom:8 }}>precio real / hora</p>
          <p style={{ fontFamily:'var(--font-mono)', fontSize:32, fontWeight:600, color:'rgba(242,247,244,0.2)', lineHeight:1, marginBottom:8 }}>$—.——</p>
          <p style={{ fontFamily:'var(--font-sans)', fontSize:13, color:'#7A9A8A', lineHeight:1.5 }}>Completa tus ingresos y horas reales para calcular tu precio por hora.</p>
        </div>
        <p className="label-micro" style={{ marginBottom:12 }}>Para empezar</p>
        <div className="onb-step">
          <div className="onb-num">1</div>
          <div>
            <p style={{ fontFamily:'var(--font-sans)', fontSize:13, fontWeight:600, color:'var(--fc-text)', marginBottom:4 }}>Registra tus fuentes de ingreso</p>
            <p style={{ fontFamily:'var(--font-sans)', fontSize:11, color:'var(--fc-muted)', lineHeight:1.5 }}>Salario fijo, freelance, pasivo — todas las entradas de dinero del mes.</p>
            <button className="ghost-btn" style={{ marginTop:8, fontSize:13, fontWeight:600 }} onClick={() => onModal('add-income')}>+ Agregar ingreso →</button>
          </div>
        </div>
        <div className="onb-step" style={{ opacity: 0.5 }}>
          <div className="onb-num">2</div>
          <div>
            <p style={{ fontFamily:'var(--font-sans)', fontSize:13, fontWeight:600, color:'var(--fc-text)', marginBottom:4 }}>Define tus horas reales</p>
            <p style={{ fontFamily:'var(--font-sans)', fontSize:11, color:'var(--fc-muted)', lineHeight:1.5 }}>Horas contratadas + commute + preparación + carga mental.</p>
          </div>
        </div>
      </div>
    );
  }

  const d = MR_DATA.desglose;
  const desglose = [
    ['Contratadas', d.contratadas], ['Horas extra', d.extra],
    ['Desplazamiento', d.desplazamiento], ['Preparación', d.preparacion], ['Carga mental', d.carga_mental],
  ];

  return (
    <div className="content-inner">
      <div style={{ marginBottom:20 }}>

function ScoreRing({ score }) {
  const r = 36, circ = 2*Math.PI*r, dash = (score/100)*circ;
  return (
    <div className="score-wrap">
      <svg width={96} height={96} viewBox="0 0 96 96" style={{ transform:'rotate(-90deg)' }}>
        <circle cx={48} cy={48} r={r} strokeWidth={6} stroke="rgba(255,255,255,0.08)" fill="none"/>
        <circle cx={48} cy={48} r={r} strokeWidth={6} stroke="#5DCAA5" fill="none" strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"/>
      </svg>
      <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
        <span style={{ fontFamily:'var(--font-mono)', fontSize:22, fontWeight:700, color:'white', lineHeight:1 }}>{score}</span>
        <span style={{ fontSize:8, color:'rgba(255,255,255,0.35)', marginTop:2 }}>APRENDIZ</span>
      </div>
    </div>
  );
}

              </div>

        })}

    </div>
  );
}

// ─── App root ─────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = useState('mi-realidad');
  const [modal, setModal] = useState(null);

  // Apply theme
  useEffect(() => {
    document.body.setAttribute('data-theme', tweaks.theme);
  }, [tweaks.theme]);

  const SCREENS = { 'mi-realidad': MiRealidad, 'dashboard': Dashboard, 'brujula': Brujula, 'ideas': Ideas };
  const Screen = SCREENS[screen];

  const renderModal = () => {
    if (!modal) return null;
    if (modal === 'add-transaction') return <AddTransactionModal onClose={() => setModal(null)} />;
    if (modal === 'add-income')      return <AddIncomeModal onClose={() => setModal(null)} />;
    const titles = { 'add-asset':'Nuevo activo', 'add-liability':'Nuevo pasivo', 'add-business':'Nuevo negocio', 'add-goal':'Nueva meta', 'add-entry':'Registrar pago', 'new-idea':'Nueva sesión' };
    return <GenericModal title={titles[modal] || 'Nuevo'} onClose={() => setModal(null)} />;
  };

  return (
    <>
      <div className="app-shell">
        <Sidebar active={screen} onNav={setScreen} />
        <main className="main-content">
          <Screen onModal={setModal} />
        </main>
        <BottomNav active={screen} onNav={setScreen} />
      </div>

      {renderModal()}

      <TweaksPanel>
        <TweakSection label="Tema visual">
          <TweakRadio id="theme" options={[
            { value:'clean',      label:'Clean (default)' },
            { value:'neumorphic', label:'Neumorphic'      },
            { value:'dark',       label:'Dark mode'       },
          ]} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
